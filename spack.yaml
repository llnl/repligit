# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  repos:
    repligit: spack/repos/spack_repo/repligit
  specs:
  - py-codespell
  - py-pytest
  - py-repligit
  - py-bandit
  - py-ruff
  - py-pip
  - py-ty
  view: true
  concretizer:
    unify: true
  develop:
    py-repligit:
      spec: py-repligit@=main
      path: .
